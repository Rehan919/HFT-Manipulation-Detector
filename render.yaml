services:
  - type: web
    name: hft-manipulation-detector
    runtime: python
    healthCheckPath: /health
    buildCommand: >
      pip install -r requirements.txt &&
      python scripts/build_dramatic_simulation.py &&
      python model/train.py
    startCommand: python -m backend
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENABLE_LIVE_MARKET
        value: "false"
      - key: ENABLE_SECONDARY_LIVE
        value: "false"
